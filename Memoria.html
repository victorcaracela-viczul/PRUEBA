<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SST GameHub - Memoria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--orange:#ff6b35;--orange-light:#fff3ed;--blue:#1e88e5;--blue-light:#e3f2fd;--green:#43a047;--green-light:#e8f5e9;--red:#e53935;--red-light:#ffebee;--purple:#7c4dff;--yellow:#ffb300;--bg:#faf7f4;--card:#fff;--text:#2d3436;--text-light:#636e72;--shadow:0 2px 12px rgba(0,0,0,0.06);--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.topbar{display:flex;align-items:center;justify-content:space-between;background:var(--card);padding:10px 16px;box-shadow:var(--shadow);flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:10px}
.btn-back{background:var(--orange-light);border:none;border-radius:10px;padding:8px 14px;color:var(--orange);font-family:'Nunito';font-weight:700;font-size:13px;cursor:pointer;transition:all .3s}
.btn-back:hover{background:var(--orange);color:#fff}
.topbar-left h1{font-family:'Fredoka';font-size:18px;color:var(--blue)}
.stats{display:flex;gap:16px}
.stat{text-align:center}.stat .v{font-family:'Fredoka';font-size:20px;font-weight:700}.stat .l{font-size:10px;color:var(--text-light);text-transform:uppercase;font-weight:700}
.btn-new{background:linear-gradient(135deg,var(--blue),#42a5f5);border:none;border-radius:10px;padding:8px 16px;color:#fff;font-family:'Fredoka';font-size:13px;cursor:pointer;transition:all .3s;box-shadow:0 3px 10px rgba(30,136,229,0.25)}
.btn-new:hover{transform:translateY(-2px)}

.loading{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading.hidden{display:none}
.ld-spinner{width:50px;height:50px;border:4px solid #e9ecef;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-text{font-family:'Fredoka';font-size:16px;color:var(--blue)}

.game-area{display:flex;flex-direction:column;align-items:center;padding:20px}
.board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:600px;width:100%}

.card{aspect-ratio:3/4;perspective:800px;cursor:pointer}
.card-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(0.34,1.56,0.64,1);transform-style:preserve-3d}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center}
.card-front{background:var(--card);border:2px solid #e9ecef;box-shadow:var(--shadow)}
.card-front .icon{font-size:36px;margin-bottom:6px}
.card-front .label{font-family:'Fredoka';font-size:10px;color:var(--text-light);text-transform:uppercase;letter-spacing:1px}
.card-back{background:var(--card);border:2px solid var(--blue);transform:rotateY(180deg);box-shadow:0 2px 12px rgba(30,136,229,0.15)}
.card-back .emoji{font-size:32px;margin-bottom:4px}
.card-back .text{font-size:13px;font-weight:800;line-height:1.2}
.card:hover .card-front{transform:scale(1.03);border-color:var(--blue)}
.card.matched .card-back{border-color:var(--green);box-shadow:0 2px 12px rgba(67,160,71,0.15);animation:matchGlow .5s ease}
@keyframes matchGlow{50%{transform:rotateY(180deg) scale(1.06)}}
.card.wrong .card-back{border-color:var(--red)!important;animation:cardShake .5s ease}
@keyframes cardShake{0%,100%{transform:rotateY(180deg) translateX(0)}25%{transform:rotateY(180deg) translateX(-5px)}75%{transform:rotateY(180deg) translateX(5px)}}
@keyframes cardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

/* Explanation Panel */
.exp-panel{position:fixed;bottom:-180px;left:50%;transform:translateX(-50%);width:90%;max-width:550px;background:var(--card);border-radius:var(--radius) var(--radius) 0 0;padding:16px 20px;box-shadow:0 -4px 20px rgba(0,0,0,0.1);z-index:60;transition:bottom .5s cubic-bezier(0.34,1.56,0.64,1)}
.exp-panel.show{bottom:0}
.exp-panel.success{border-top:3px solid var(--green)}
.exp-panel.error{border-top:3px solid var(--red)}
.exp-panel .eh{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.exp-panel .badge{padding:3px 10px;border-radius:6px;font-family:'Fredoka';font-size:11px;font-weight:700}
.exp-panel.success .badge{background:var(--green-light);color:var(--green)}
.exp-panel.error .badge{background:var(--red-light);color:var(--red)}
.exp-panel .et{font-size:13px;color:var(--text-light);line-height:1.4}
.exp-panel .ai{font-size:10px;color:var(--purple);margin-top:6px;opacity:.7}

.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:24px;padding:36px;text-align:center;max-width:400px;width:90%;animation:popIn .5s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 10px 40px rgba(0,0,0,0.15)}
@keyframes popIn{from{transform:scale(.85);opacity:0}}
.modal .trophy{font-size:56px;margin-bottom:12px}
.modal h2{font-family:'Fredoka';font-size:22px;color:var(--green);margin-bottom:8px}
.modal .info{color:var(--text-light);font-size:14px;margin-bottom:18px;line-height:1.6}
.modal .info strong{color:var(--orange);font-family:'Fredoka'}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btns button{padding:12px 22px;border-radius:12px;font-family:'Fredoka';font-size:13px;cursor:pointer;border:none;transition:all .3s}
.modal-btns .btn-primary{background:linear-gradient(135deg,var(--blue),#42a5f5);color:#fff}
.modal-btns .btn-secondary{background:#f1f3f5;color:var(--text)}

@media(max-width:500px){.board{grid-template-columns:repeat(3,1fr);gap:8px}}
</style>
</head>
<body>
<div class="loading" id="loadingScreen"><div class="ld-spinner"></div><div class="ld-text">Generando tarjetas con IA... 🤖</div></div>

<div class="topbar">
  <div class="topbar-left">
    <button class="btn-back" onclick="goBack()">← Volver</button>
    <h1>🧠 Memoria SST</h1>
  </div>
  <div class="stats">
    <div class="stat"><div class="v" id="score" style="color:var(--green)">0</div><div class="l">Puntaje</div></div>
    <div class="stat"><div class="v" id="pairs" style="color:var(--blue)">0/0</div><div class="l">Parejas</div></div>
    <div class="stat"><div class="v" id="moves" style="color:var(--orange)">0</div><div class="l">Movimientos</div></div>
    <div class="stat"><div class="v" id="errors" style="color:var(--red)">0</div><div class="l">Errores</div></div>
  </div>
  <button class="btn-new" onclick="startGame()">🔄 Nuevo juego</button>
</div>

<div class="game-area"><div class="board" id="board"></div></div>

<div class="exp-panel" id="expPanel">
  <div class="eh"><span class="badge" id="expBadge">CORRECTO</span></div>
  <div class="et" id="expText"></div>
  <div class="ai">🤖 Explicación generada por IA</div>
</div>

<div class="modal-bg" id="winModal">
  <div class="modal">
    <div class="trophy">🧠</div>
    <h2>¡Memoria perfecta!</h2>
    <div class="info" id="winInfo"></div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="goBack()">← Menú</button>
      <button class="btn-primary" onclick="startGame();document.getElementById('winModal').classList.remove('show')">Jugar de nuevo ▶</button>
    </div>
  </div>
</div>

<script>
let gameData=null,cards=[],flipped=[],matchedPairs=0,totalPairs=0,moves=0,errors=0,score=0,processing=false,currentUser=null,startTime=0;

document.addEventListener('DOMContentLoaded',()=>{
  const s=sessionStorage.getItem('sst_user');if(s)currentUser=JSON.parse(s);
  startGame();
});

async function getDataFromAI(){
  return new Promise(r=>{try{google.script.run.withSuccessHandler(function(d){if(d&&d.pairs)r(d);else r(simAI())}).withFailureHandler(function(){r(simAI())}).getAIContent('memoria',{pairs:8})}catch(e){r(simAI())}});
}
function simAI(){
  return{pairs:[{id:1,front:"📊",back:"SIN DATOS",explanation:"Llena la hoja Memoria_Manual en tu Google Sheet."}]};
}

async function startGame(){
  flipped=[];matchedPairs=0;moves=0;errors=0;score=0;processing=false;startTime=Date.now();
  updateStats();
  document.getElementById('loadingScreen').classList.remove('hidden');
  document.getElementById('expPanel').className='exp-panel';

  gameData=await getDataFromAI();
  totalPairs=gameData.pairs.length;
  document.getElementById('pairs').textContent='0/'+totalPairs;

  cards=[];
  gameData.pairs.forEach(p=>{
    cards.push({pairId:p.id,side:'front',display:p.front,pair:p});
    cards.push({pairId:p.id,side:'back',display:p.back,pair:p});
  });
  for(let i=cards.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[cards[i],cards[j]]=[cards[j],cards[i]]}
  renderBoard();
  document.getElementById('loadingScreen').classList.add('hidden');
}

function renderBoard(){
  const b=document.getElementById('board');b.innerHTML='';
  cards.forEach((c,i)=>{
    const el=document.createElement('div');el.className='card';el.dataset.idx=i;
    el.innerHTML=`<div class="card-inner"><div class="card-face card-front"><div class="icon">🛡️</div><div class="label">SST</div></div><div class="card-face card-back"><div class="emoji">${c.display}</div><div class="text">${c.side==='back'?c.display:''}</div></div></div>`;
    el.onclick=()=>flipCard(i,el);
    el.style.animation='cardIn .3s ease '+(i*25)+'ms both';
    b.appendChild(el);
  });
}

function flipCard(idx,el){
  if(processing||el.classList.contains('flipped')||el.classList.contains('matched')||flipped.length>=2)return;
  el.classList.add('flipped');flipped.push({idx,el,card:cards[idx]});
  if(flipped.length===2){moves++;document.getElementById('moves').textContent=moves;processing=true;
    const[a,b]=flipped;
    if(a.card.pairId===b.card.pairId&&a.card.side!==b.card.side)setTimeout(()=>handleMatch(a,b),600);
    else setTimeout(()=>handleMiss(a,b),800);
  }
}

function handleMatch(a,b){
  a.el.classList.add('matched');b.el.classList.add('matched');matchedPairs++;score+=100;updateStats();
  showExp('success','✅ ¡Par encontrado!',a.card.pair.explanation);
  flipped=[];processing=false;
  if(matchedPairs>=totalPairs)setTimeout(endGame,1200);
}

function handleMiss(a,b){
  errors++;score=Math.max(0,score-20);updateStats();
  a.el.classList.add('wrong');b.el.classList.add('wrong');
  showExp('error','❌ No son pareja',`${a.card.pair.front} = "${a.card.pair.back}". ${a.card.pair.explanation}`);
  setTimeout(()=>{a.el.classList.remove('flipped','wrong');b.el.classList.remove('flipped','wrong');flipped=[];processing=false},400);
}

function showExp(type,badge,text){
  const p=document.getElementById('expPanel');p.className='exp-panel show '+type;
  document.getElementById('expBadge').textContent=badge;
  document.getElementById('expText').textContent=text;
  clearTimeout(p._t);p._t=setTimeout(()=>p.classList.remove('show'),4000);
}

function updateStats(){
  document.getElementById('score').textContent=score;
  document.getElementById('pairs').textContent=matchedPairs+'/'+totalPairs;
  document.getElementById('moves').textContent=moves;
  document.getElementById('errors').textContent=errors;
}

function endGame(){
  const el=Math.floor((Date.now()-startTime)/1000),m=Math.floor(el/60),s=el%60;
  const tb=Math.max(300-el*2,0),eff=Math.round((totalPairs/moves)*100),fs=score+tb;
  document.getElementById('winInfo').innerHTML=`Puntaje: <strong>${score}</strong><br>Bono tiempo: <strong>+${tb}</strong><br>Movimientos: <strong>${moves}</strong> | Errores: <strong>${errors}</strong><br>Eficiencia: <strong>${eff}%</strong><br>Tiempo: <strong>${m}:${s<10?'0':''}${s}</strong><br><br>Total: <strong style="font-size:28px;color:var(--green)">${fs}</strong>`;
  document.getElementById('winModal').classList.add('show');
  if(currentUser)try{google.script.run.saveScore({dni:currentUser.dni,nombre:currentUser.nombre+' '+currentUser.apellido,juego:'Memoria SST',puntaje:fs,tiempo:m+':'+(s<10?'0':'')+s,detalles:'Parejas:'+totalPairs+',Movimientos:'+moves+',Errores:'+errors})}catch(e){}
}

function goBack(){try{google.script.run.withSuccessHandler(function(u){window.top.location.href=u+'?page=Portal'}).withFailureHandler(function(){window.top.location.href='Portal.html'}).getWebAppUrl()}catch(e){window.top.location.href='Portal.html'}}
</script>
</body>
</html>
