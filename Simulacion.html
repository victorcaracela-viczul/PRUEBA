<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SST GameHub - Simulación</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--orange:#ff6b35;--orange-light:#fff3ed;--blue:#1e88e5;--blue-light:#e3f2fd;--green:#43a047;--green-light:#e8f5e9;--red:#e53935;--red-light:#ffebee;--purple:#7c4dff;--yellow:#ffb300;--bg:#faf7f4;--card:#fff;--text:#2d3436;--text-light:#636e72;--shadow:0 2px 12px rgba(0,0,0,0.06);--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

.topbar{display:flex;align-items:center;justify-content:space-between;background:var(--card);padding:10px 16px;box-shadow:var(--shadow);flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:10px}
.btn-back{background:var(--orange-light);border:none;border-radius:10px;padding:8px 14px;color:var(--orange);font-family:'Nunito';font-weight:700;font-size:13px;cursor:pointer;transition:all .3s}
.btn-back:hover{background:var(--orange);color:#fff}
.topbar-left h1{font-family:'Fredoka';font-size:18px;color:var(--red)}
.stats{display:flex;gap:16px}.stat{text-align:center}.stat .v{font-family:'Fredoka';font-size:20px;font-weight:700}.stat .l{font-size:10px;color:var(--text-light);text-transform:uppercase;font-weight:700}
.btn-new{background:linear-gradient(135deg,var(--red),#ef5350);border:none;border-radius:10px;padding:8px 16px;color:#fff;font-family:'Fredoka';font-size:13px;cursor:pointer;transition:all .3s;box-shadow:0 3px 10px rgba(229,57,53,0.25)}

.loading{position:fixed;top:0;left:0;width:100%;height:100%;background:var(--bg);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.loading.hidden{display:none}
.ld-spinner{width:50px;height:50px;border:4px solid #e9ecef;border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-text{font-family:'Fredoka';font-size:16px;color:var(--red)}

.game-layout{display:flex;gap:16px;padding:16px;max-width:1200px;margin:0 auto;min-height:calc(100vh - 60px)}

.scene-panel{flex:2;display:flex;flex-direction:column;gap:12px}
.scene-header{background:var(--card);border-radius:var(--radius);padding:14px 18px;box-shadow:var(--shadow)}
.scene-header h2{font-family:'Fredoka';font-size:16px;color:var(--red);margin-bottom:4px}
.scene-header p{font-size:13px;color:var(--text-light);line-height:1.3}

.inspection-area{position:relative;border-radius:var(--radius);overflow:hidden;border:2px solid #e9ecef;aspect-ratio:16/10;min-height:360px;cursor:crosshair;box-shadow:var(--shadow)}

.scene-bg{position:absolute;top:0;left:0;width:100%;height:100%}
.scene-bg.construccion{background:linear-gradient(180deg,#87CEEB 0%,#87CEEB 40%,#d4a574 40%,#c2956a 100%)}
.scene-bg.taller{background:linear-gradient(180deg,#6b7b8d 0%,#5a6a7d 60%,#8a8a8a 60%,#7a7a7a 100%)}
.scene-bg.almacen{background:linear-gradient(180deg,#4a6680 0%,#3a5670 60%,#5a7a90 60%,#4a6a80 100%)}

.scene-el{position:absolute;border-radius:3px;opacity:.5}

.hazard-zone{position:absolute;border:2px dashed transparent;border-radius:10px;cursor:pointer;transition:all .3s;z-index:5}
.hazard-zone:hover{border-color:rgba(255,107,53,0.4);background:rgba(255,107,53,0.08)}
.hazard-zone.found{border-color:var(--green)!important;background:rgba(67,160,71,0.12)!important;animation:hz-found .5s ease}
@keyframes hz-found{50%{transform:scale(1.05)}}
.hazard-zone.found::after{content:'✅';position:absolute;top:-10px;right:-10px;font-size:20px;z-index:10}
.hazard-zone.revealed{border-color:var(--red)!important;background:rgba(229,57,53,0.12)!important;animation:hz-pulse 1.5s ease infinite}
@keyframes hz-pulse{0%,100%{box-shadow:0 0 0 0 rgba(229,57,53,0.25)}50%{box-shadow:0 0 0 6px transparent}}

.hz-label{position:absolute;bottom:-26px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:700;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .3s}
.hazard-zone:hover .hz-label,.hazard-zone.found .hz-label,.hazard-zone.revealed .hz-label{opacity:1}
.hazard-zone.found .hz-label{color:var(--green)}.hazard-zone.revealed .hz-label{color:var(--red)}

.click-fx{position:absolute;width:24px;height:24px;border:2px solid var(--orange);border-radius:50%;transform:translate(-50%,-50%);animation:ripple .5s ease forwards;pointer-events:none;z-index:20}
@keyframes ripple{0%{width:0;height:0;opacity:1}100%{width:50px;height:50px;opacity:0}}

.info-panel{flex:1;min-width:260px;display:flex;flex-direction:column;gap:12px}

.timer-card{background:var(--card);border-radius:var(--radius);padding:16px;text-align:center;box-shadow:var(--shadow)}
.time-val{font-family:'Fredoka';font-size:36px;font-weight:700;color:var(--blue)}
.time-val.warning{color:var(--red);animation:timePulse .5s ease infinite}
@keyframes timePulse{50%{opacity:.5}}
.time-lbl{font-size:11px;color:var(--text-light);text-transform:uppercase;font-weight:700}
.btn-finish{width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--red),var(--orange));color:#fff;font-family:'Fredoka';font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;transition:all .3s;box-shadow:0 3px 12px rgba(229,57,53,0.25)}
.btn-finish:hover{transform:translateY(-2px)}

.hazards-list{background:var(--card);border-radius:var(--radius);padding:14px;flex:1;overflow-y:auto;box-shadow:var(--shadow)}
.hazards-list h3{font-family:'Fredoka';font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.hazards-list h3::before{content:'';width:3px;height:14px;background:var(--red);border-radius:2px}

.hz-item{background:#f8f9fa;border:1px solid #e9ecef;border-radius:12px;padding:10px 12px;margin-bottom:6px;transition:all .3s}
.hz-item.found{border-color:rgba(67,160,71,0.3);background:var(--green-light)}
.hz-item.missed{border-color:rgba(229,57,53,0.3);opacity:.6}
.hz-item .hi-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.hz-item .hi-name{font-size:13px;font-weight:800}
.hz-item .hi-sev{font-family:'Fredoka';font-size:9px;padding:2px 7px;border-radius:4px;font-weight:700}
.hi-sev.alta{background:var(--red-light);color:var(--red)}.hi-sev.media{background:rgba(255,179,0,0.12);color:var(--yellow)}
.hz-item .hi-desc{font-size:11px;color:var(--text-light);display:none;line-height:1.2}
.hz-item .hi-sol{font-size:11px;color:var(--green);margin-top:4px;display:none;line-height:1.2}
.hz-item.found .hi-desc,.hz-item.found .hi-sol{display:block}

.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.3);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:24px;padding:36px;text-align:center;max-width:420px;width:90%;animation:popIn .5s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 10px 40px rgba(0,0,0,0.15)}
@keyframes popIn{from{transform:scale(.85);opacity:0}}
.modal .trophy{font-size:56px;margin-bottom:12px}
.modal h2{font-family:'Fredoka';font-size:22px;margin-bottom:8px}
.modal .score-big{font-family:'Fredoka';font-size:44px;font-weight:700;color:var(--green)}
.modal .info{color:var(--text-light);font-size:14px;margin:12px 0 18px;line-height:1.6}
.modal .info strong{color:var(--orange);font-family:'Fredoka'}
.modal-btns{display:flex;gap:10px;justify-content:center}
.modal-btns button{padding:12px 22px;border-radius:12px;font-family:'Fredoka';font-size:13px;cursor:pointer;border:none;transition:all .3s}
.modal-btns .btn-primary{background:linear-gradient(135deg,var(--red),var(--orange));color:#fff}
.modal-btns .btn-secondary{background:#f1f3f5;color:var(--text)}

@media(max-width:900px){.game-layout{flex-direction:column}.info-panel{min-width:unset}}
</style>
</head>
<body>
<div class="loading" id="loadingScreen"><div class="ld-spinner"></div><div class="ld-text">Generando escenario con IA... 🤖</div></div>

<div class="topbar">
  <div class="topbar-left"><button class="btn-back" onclick="goBack()">← Volver</button><h1>🏗️ Simulación de Riesgos</h1></div>
  <div class="stats">
    <div class="stat"><div class="v" id="score" style="color:var(--green)">0</div><div class="l">Puntaje</div></div>
    <div class="stat"><div class="v" id="found" style="color:var(--orange)">0/0</div><div class="l">Encontrados</div></div>
  </div>
  <button class="btn-new" onclick="startGame()">🔄 Nuevo escenario</button>
</div>

<div class="game-layout">
  <div class="scene-panel">
    <div class="scene-header"><h2 id="scTitle">Cargando...</h2><p id="scDesc">La IA está generando un escenario.</p></div>
    <div class="inspection-area" id="inspArea" onclick="areaClick(event)"><div class="scene-bg" id="sceneBg"></div></div>
  </div>
  <div class="info-panel">
    <div class="timer-card">
      <div class="time-val" id="timeVal">1:30</div>
      <div class="time-lbl">Tiempo restante</div>
      <button class="btn-finish" onclick="finish()">🔍 Finalizar inspección</button>
    </div>
    <div class="hazards-list">
      <h3>Peligros (<span id="fc">0</span>/<span id="tc">0</span>)</h3>
      <div id="hzList"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="resultModal"><div class="modal">
  <div class="trophy" id="resTrophy">🔍</div>
  <h2 id="resTitle">Inspección completada</h2>
  <div class="score-big" id="resFinal">0</div>
  <div class="info" id="resInfo"></div>
  <div class="modal-btns">
    <button class="btn-secondary" onclick="goBack()">← Menú</button>
    <button class="btn-primary" onclick="startGame();document.getElementById('resultModal').classList.remove('show')">Nuevo escenario ▶</button>
  </div>
</div></div>

<script>
let scenario=null,hazards=[],foundSet=new Set(),score=0,timerInt=null,timeRem=90,gameOver=false,currentUser=null;

document.addEventListener('DOMContentLoaded',()=>{const s=sessionStorage.getItem('sst_user');if(s)currentUser=JSON.parse(s);startGame()});

async function getDataFromAI(){return new Promise(r=>{try{google.script.run.withSuccessHandler(function(d){if(d&&d.scenario&&d.hazards)r(d);else r(simAI())}).withFailureHandler(function(){r(simAI())}).getAIContent('simulacion',{})}catch(e){r(simAI())}})}
function simAI(){
  return{scenario:{title:"Sin escenario",description:"Llena la hoja Simulacion_Manual en tu Google Sheet.",environment:"vacio"},hazards:[{id:1,name:"Sin datos",description:"Configura tus escenarios",severity:"baja",x:50,y:50,width:20,height:20,solution:"Abre Simulacion_Manual y agrega filas."}]};
}

async function startGame(){
  foundSet.clear();score=0;timeRem=90;gameOver=false;
  if(timerInt)clearInterval(timerInt);
  document.getElementById('score').textContent='0';
  document.getElementById('loadingScreen').classList.remove('hidden');

  const d=await getDataFromAI();scenario=d.scenario;hazards=d.hazards;
  document.getElementById('found').textContent='0/'+hazards.length;
  document.getElementById('fc').textContent='0';document.getElementById('tc').textContent=hazards.length;
  document.getElementById('scTitle').textContent=scenario.title;
  document.getElementById('scDesc').textContent=scenario.description;
  document.getElementById('sceneBg').className='scene-bg '+scenario.environment;

  renderScene();renderList();
  setTimeout(()=>{document.getElementById('loadingScreen').classList.add('hidden');startCountdown()},300);
}

function renderScene(){
  const a=document.getElementById('inspArea');
  a.querySelectorAll('.hazard-zone,.scene-el').forEach(e=>e.remove());
  drawEnv(scenario.environment);
  hazards.forEach(h=>{
    const z=document.createElement('div');z.className='hazard-zone';z.id='hz-'+h.id;
    z.style.cssText=`left:${h.x}%;top:${h.y}%;width:${h.width}%;height:${h.height}%`;
    z.onclick=e=>{e.stopPropagation();findHazard(h.id)};
    const lb=document.createElement('div');lb.className='hz-label';lb.textContent=h.name;z.appendChild(lb);
    a.appendChild(z);
  });
}

function drawEnv(env){
  const a=document.getElementById('inspArea');
  const add=(l,t,w,h,c)=>{const e=document.createElement('div');e.className='scene-el';e.style.cssText=`left:${l};top:${t};width:${w};height:${h};background:${c}`;a.appendChild(e)};
  if(env==='construccion'){add('0%','38%','100%','3px','#8B7355');add('10%','10%','4px','28%','#888');add('45%','10%','4px','28%','#888');add('80%','10%','4px','28%','#888');add('0%','65%','100%','2px','#8B7355');add('88%','0%','4px','40%','#DAA520');add('75%','3%','17%','3px','#DAA520')}
  else if(env==='taller'){add('5%','55%','35%','3px','#888');add('55%','55%','35%','3px','#888');add('92%','10%','3px','80%','#777')}
  else{add('5%','20%','3px','65%','#6a8da0');add('35%','20%','3px','65%','#6a8da0');add('65%','20%','3px','65%','#6a8da0');for(let i=0;i<3;i++){add('5%',(30+i*20)+'%','30%','2px','#6a8da0');add('35%',(30+i*20)+'%','30%','2px','#6a8da0')}}
}

function renderList(){
  const l=document.getElementById('hzList');l.innerHTML='';
  hazards.forEach(h=>{
    const it=document.createElement('div');it.className='hz-item';it.id='hi-'+h.id;
    it.innerHTML=`<div class="hi-head"><span class="hi-name">❓ Peligro #${h.id}</span><span class="hi-sev ${h.severity}">${h.severity.toUpperCase()}</span></div><div class="hi-desc">${h.description}</div><div class="hi-sol">${h.solution}</div>`;
    l.appendChild(it);
  });
}

function findHazard(id){
  if(gameOver||foundSet.has(id))return;
  foundSet.add(id);
  const h=hazards.find(x=>x.id===id);
  const pts=h.severity==='alta'?200:150;
  score+=pts+Math.floor(timeRem/3);

  document.getElementById('score').textContent=score;
  document.getElementById('found').textContent=foundSet.size+'/'+hazards.length;
  document.getElementById('fc').textContent=foundSet.size;

  document.getElementById('hz-'+id).classList.add('found');
  const it=document.getElementById('hi-'+id);it.classList.add('found');
  it.querySelector('.hi-name').textContent='✅ '+h.name;

  if(foundSet.size>=hazards.length)setTimeout(finish,800);
}

function areaClick(e){
  if(gameOver)return;
  const r=e.currentTarget.getBoundingClientRect();
  const fx=document.createElement('div');fx.className='click-fx';
  fx.style.left=(e.clientX-r.left)+'px';fx.style.top=(e.clientY-r.top)+'px';
  e.currentTarget.appendChild(fx);setTimeout(()=>fx.remove(),500);
  score=Math.max(0,score-10);document.getElementById('score').textContent=score;
}

function startCountdown(){
  const tv=document.getElementById('timeVal');
  timerInt=setInterval(()=>{
    timeRem--;const m=Math.floor(timeRem/60),s=timeRem%60;
    tv.textContent=m+':'+(s<10?'0':'')+s;
    if(timeRem<=15)tv.classList.add('warning');
    if(timeRem<=0){clearInterval(timerInt);finish()}
  },1000);
}

function finish(){
  if(gameOver)return;gameOver=true;clearInterval(timerInt);
  hazards.forEach(h=>{
    if(!foundSet.has(h.id)){
      document.getElementById('hz-'+h.id).classList.add('revealed');
      const it=document.getElementById('hi-'+h.id);it.classList.add('missed');it.querySelector('.hi-name').textContent='❌ '+h.name;
      it.querySelector('.hi-desc').style.display='block';
    }
  });

  const fc=foundSet.size,tc=hazards.length,pct=Math.round((fc/tc)*100);
  const bonus=fc>=tc?500:0,fs=score+bonus;
  let trophy,title,clr;
  if(pct===100){trophy='🏆';title='¡Inspector experto!';clr='var(--green)'}
  else if(pct>=80){trophy='🥈';title='¡Buena inspección!';clr='var(--blue)'}
  else if(pct>=50){trophy='🥉';title='Inspección parcial';clr='var(--yellow)'}
  else{trophy='⚠️';title='Necesitas mejorar';clr='var(--red)'}

  document.getElementById('resTrophy').textContent=trophy;
  document.getElementById('resTitle').textContent=title;document.getElementById('resTitle').style.color=clr;
  document.getElementById('resFinal').textContent=fs;
  document.getElementById('resInfo').innerHTML=`Encontrados: <strong>${fc}/${tc}</strong><br>Efectividad: <strong>${pct}%</strong><br>${bonus?`Bono completo: <strong>+${bonus}</strong><br>`:''}Escenario: <strong>${scenario.title}</strong>`;
  setTimeout(()=>document.getElementById('resultModal').classList.add('show'),1200);

  if(currentUser)try{google.script.run.saveScore({dni:currentUser.dni,nombre:currentUser.nombre+' '+currentUser.apellido,juego:'Simulación SST',puntaje:fs,tiempo:(90-timeRem)+'s',detalles:'Escenario:'+scenario.title+',Encontrados:'+fc+'/'+tc})}catch(e){}
}

function goBack(){if(timerInt)clearInterval(timerInt);try{google.script.run.withSuccessHandler(function(u){window.top.location.href=u+'?page=Portal'}).withFailureHandler(function(){window.top.location.href='Portal.html'}).getWebAppUrl()}catch(e){window.top.location.href='Portal.html'}}
</script>
</body>
</html>
